<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Herbario BAB</title>

  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="logo_bab.ico">
</head>

<body>

<header class="header">
  <div class="logo-nav-container">
    <img src="logo_bab.png" alt="Herbario BAB">

    <span class="menu-icon">Ver menú</span>

    <nav class="navigation">
      <ul>
        <li><a href="index.html">Inicio</a></li>
        <li><a href="acerca.html">Acerca</a></li>
        <li><a href="portal.html">Herbario</a></li>
        <li><a href="#">Sistemas</a></li>
        <li><a href="contacto.html">Contacto</a></li>
      </ul>
    </nav>
  </div>
</header>

<main class="main">

  <!-- CARRUSEL -->
  <div id="carrusel-contenido">
    <div id="carrusel-caja">

      <div class="slide">
        <img class="imagenes" src="imagenes/1.jpg">
        <img class="imagenes" src="imagenes/2.jpg">
        <img class="imagenes" src="imagenes/3.jpg">
      </div>

      <div class="slide">
        <img class="imagenes" src="imagenes/4.jpg">
        <img class="imagenes" src="imagenes/5.jpg">
        <img class="imagenes" src="imagenes/6.jpg">
      </div>

      <div class="slide">
        <img class="imagenes" src="imagenes/7.jpg">
        <img class="imagenes" src="imagenes/8.jpg">
        <img class="imagenes" src="imagenes/5.jpg">
      </div>

    </div>
  </div>

  <section class="buscador-home">
  <p>Buscador del portal del Herbario BAB</p>
  <form class="form-busqueda" action="portal.html" method="get">
  <input
    type="text"
    name="q"
    placeholder="Buscar por taxón, colector, localidad…"
    required
  >
  <button type="submit">Buscar</button>
</form>



</main>

<footer class="footer">
  <p>Herbario y Bioprospección</p>
</footer>

<script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
<script src="scripts.js"></script>

</body>
</html>
